<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizzlyUnivers - Mode Aléatoire</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo" onclick="location.href='index.html'">⚡ QuizzlyUnivers</div>
            <ul class="nav-menu">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="javascript:void(0)" class="suggestion-button" onclick="suggestNewTheme()">Proposer un thème</a></li>
                <li><a href="javascript:void(0)" class="report-button" onclick="openReportModal()">🐛 Signaler / Suggérer</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="quiz-container">

            <!-- Quiz Section -->
            <div id="quiz-container">
                <div class="quiz-header" id="quiz-header">
                    <h1>🎲 Mode Aléatoire</h1>
                    <p>10 questions piochées au hasard dans tous les thèmes</p>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <p style="text-align: center; margin-bottom: 1rem; color: #94a3b8;" id="progress-text"></p>

                <div class="question-card" id="question-container">
                    <!-- Les questions seront générées ici par JavaScript -->
                </div>

                <div class="button-container">
                    <button id="next-button" class="btn btn-primary">Suivante →</button>
                </div>
            </div>

            <!-- Résultats -->
            <div id="results-container" class="results-container" style="display: none;">
                <div class="results-header">
                    <h2>🎉 Quiz Terminé !</h2>
                    <p id="results-message"></p>
                </div>

                <div class="results-score">
                    <div class="score-circle">
                        <span id="score-percentage">0%</span>
                    </div>
                    <div class="score-details">
                        <p><strong id="score-text">0/10</strong> bonnes réponses</p>
                        <p id="performance-message"></p>
                    </div>
                </div>

                <div id="review-section" class="review-section"></div>

                <div class="button-container">
                    <button class="btn btn-primary" onclick="relaunchRandom()">🎲 Nouvelle partie aléatoire</button>
                    <button class="btn btn-secondary" onclick="location.href='index.html'">Retour à l'accueil</button>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 QuizzlyUnivers — L'Univers du Quizz</p>
    </footer>

    <script src="questions.js"></script>
    <script src="script.js"></script>
    <script src="animations.js"></script>
    <script>
        function relaunchRandom() {
            document.getElementById('results-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            startRandomQuiz();
        }
    </script>
</body>
</html>
